<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#155B67">
<title>Admin · Diagnóstika Engenharia</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--teal:#155B67;--teal-dk:#0D3C44;--turq:#00B4AC;--lime:#8DB72A;--purple:#7D3C98;--amber:#D4A24C;--red:#C00000;--green:#1B8A4A;--text:#1A2E31;--text2:#4A6568;--gray:#F0F4F5;--gray2:#E0EAEC;--gray3:#A8BFC2;--gray4:#5A7A7E}
html,body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--gray);color:var(--text);font-size:14px;min-height:100vh}

header{background:var(--teal);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 8px rgba(0,0,0,.15);position:sticky;top:0;z-index:10}
header img{height:52px;filter:brightness(0) invert(1)}
header h1{font-size:18px;font-weight:700;flex:1}
header a{color:#fff;text-decoration:none;font-size:12px;background:rgba(255,255,255,.15);padding:6px 12px;border-radius:6px}
header a:hover{background:rgba(255,255,255,.25)}

main{padding:18px;max-width:1400px;margin:0 auto}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.stat{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-left:4px solid var(--teal)}
.stat.s-mc{border-left-color:#155B67}
.stat.s-mm{border-left-color:#00B4AC}
.stat.s-pp{border-left-color:#8DB72A}
.stat.s-sc{border-left-color:#7D3C98}
.stat.s-jm{border-left-color:#D4A24C}
.stat.s-total{border-left-color:#1B8A4A;background:linear-gradient(135deg,rgba(27,138,74,.06),#fff)}
.stat-num{font-size:26px;font-weight:800;color:var(--text);line-height:1.1}
.stat-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-top:4px}
.stat-sub{font-size:11px;color:var(--gray4);margin-top:3px}

.toolbar{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.toolbar select,.toolbar input{padding:7px 10px;border:1px solid var(--gray2);border-radius:6px;font-size:13px;font-family:inherit}
.toolbar button{padding:7px 14px;border:none;border-radius:6px;background:var(--teal);color:#fff;font-weight:700;cursor:pointer;font-size:12px}
.toolbar button:hover{background:var(--teal-dk)}
.toolbar .badge{padding:4px 10px;border-radius:12px;font-size:11px;font-weight:700;background:var(--gray);color:var(--text2)}
.toolbar .badge.live{background:rgba(27,138,74,.15);color:var(--green)}

table{width:100%;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);border-collapse:collapse}
th{background:var(--teal);color:#fff;padding:11px 12px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
td{padding:11px 12px;border-top:1px solid var(--gray2);font-size:13px;vertical-align:middle}
tr.row-click{cursor:pointer;transition:background .15s}
tr.row-click:hover{background:var(--gray)}
.pill{display:inline-block;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.p-mc{background:rgba(21,91,103,.12);color:#155B67}
.p-mm{background:rgba(0,180,172,.15);color:#008A83}
.p-pp{background:rgba(141,183,42,.18);color:#6a8a1e}
.p-sc{background:rgba(125,60,152,.15);color:#7D3C98}
.p-jm{background:rgba(212,162,76,.2);color:#A87826}
.p-nc{background:rgba(192,0,0,.12);color:var(--red)}
.p-ok{background:rgba(27,138,74,.12);color:var(--green)}

.empty{text-align:center;padding:60px 20px;color:var(--gray4)}
.empty h3{font-size:18px;margin-bottom:8px;color:var(--text2)}

.loading{text-align:center;padding:40px;color:var(--text2);font-size:13px}

/* Modal detalhes */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:12px;max-width:900px;width:100%;max-height:90vh;overflow-y:auto;padding:24px;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;font-size:24px;cursor:pointer;color:var(--gray4);line-height:1}
.modal h2{font-size:20px;color:var(--teal);margin-bottom:4px}
.modal .sub{font-size:13px;color:var(--text2);margin-bottom:18px}
.modal-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.modal-stat{text-align:center;padding:14px 8px;border-radius:8px;border:1.5px solid var(--gray2)}
.ms-c{border-color:var(--green);background:rgba(27,138,74,.06)}
.ms-n{border-color:var(--red);background:rgba(192,0,0,.06)}
.ms-a{border-color:var(--gray3);background:var(--gray)}
.modal-stat big{display:block;font-size:24px;font-weight:800}
.modal-stat small{font-size:10px;text-transform:uppercase;color:var(--text2);letter-spacing:.3px}
.modal h3{font-size:13px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--gray2)}
.item-list{display:flex;flex-direction:column;gap:8px}
.item{padding:10px 12px;background:var(--gray);border-radius:6px;border-left:3px solid var(--gray3)}
.item.is-c{border-left-color:var(--green);background:rgba(27,138,74,.05)}
.item.is-n{border-left-color:var(--red);background:rgba(192,0,0,.05)}
.item-name{font-weight:600;font-size:13px;margin-bottom:3px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.item-obs{font-size:11.5px;color:var(--text2);line-height:1.5;margin-top:4px;font-style:italic}
.item-fotos{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px;margin-top:8px}
.item-fotos img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:5px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.2)}

.foto-zoom{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;cursor:zoom-out}
.foto-zoom img,.foto-zoom video{max-width:100%;max-height:100%;object-fit:contain}
</style>
</head>
<body>

<header>
  <a href="https://diagnostika-engenharia.github.io/" title="Voltar ao portal Diagnóstika" style="display:inline-flex;align-items:center"><img src="assets/logo-dark.png" alt="Diagnóstika" style="cursor:pointer"></a>
  <h1>Painel Admin · Diagnóstika</h1>
  <a href="https://diagnostika-engenharia.github.io/">← Portal</a>
  <a href="https://diagnostika-engenharia.github.io/pmp/">App PMP →</a>
</header>

<main>
  <div style="display:flex;gap:6px;background:#fff;border-radius:10px;padding:5px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)">
    <button onclick="trocarSecao('visitas')" id="sec-tab-visitas" class="sec-tab" style="flex:1;padding:11px;border:none;background:var(--teal);color:#fff;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer">📋 Visitas</button>
    <button onclick="trocarSecao('demandas')" id="sec-tab-demandas" class="sec-tab" style="flex:1;padding:11px;border:none;background:transparent;color:var(--text2);border-radius:8px;font-weight:700;font-size:13px;cursor:pointer">💬 Demandas <span id="dem-pendentes" style="background:var(--red);color:#fff;font-size:10px;padding:1px 7px;border-radius:8px;margin-left:4px;display:none"></span></button>
  </div>

  <div id="sec-visitas">
  <div class="stats" id="stats"><div class="stat"><div class="stat-label">Carregando…</div></div></div>

  <div class="toolbar">
    <span class="badge live" id="conn-badge">⏳ Conectando ao Supabase…</span>
    <select id="filtro-condo"><option value="">Todos condomínios</option></select>
    <input type="text" id="filtro-busca" placeholder="🔍 Buscar engenheiro/data..." style="flex:1;min-width:160px">
    <button onclick="toggleSelecao()" id="btn-selecao">☑ Selecionar</button>
    <button onclick="recarregar()">🔄 Atualizar</button>
  </div>
  <div id="bulk-bar" style="display:none;background:#FFF8E1;border-left:4px solid #FBC02D;padding:10px 14px;margin-bottom:10px;border-radius:8px;align-items:center;gap:10px;flex-wrap:wrap">
    <span style="flex:1;font-size:13px;font-weight:600"><span id="bulk-count">0</span> visita(s) selecionada(s)</span>
    <button onclick="selecionarTodasAdmin()" style="background:transparent;border:1px solid var(--gray3);padding:6px 12px;border-radius:5px;font-size:11px;cursor:pointer;font-weight:600">Selecionar todas visíveis</button>
    <button onclick="limparSelecaoAdmin()" style="background:transparent;border:1px solid var(--gray3);padding:6px 12px;border-radius:5px;font-size:11px;cursor:pointer;font-weight:600">Limpar</button>
    <button onclick="excluirSelecionadasAdmin()" style="background:#C00000;border:none;color:#fff;padding:6px 14px;border-radius:5px;font-size:11px;cursor:pointer;font-weight:700">🗑 Excluir Selecionadas</button>
  </div>

  <table id="tabela">
    <thead><tr id="thead-row"><th>Data</th><th>Condomínio</th><th>Engenheiro</th><th style="text-align:center">Itens</th><th style="text-align:center">Status</th><th>Última atualização</th><th style="text-align:center">Ações</th></tr></thead>
    <tbody id="tbody"><tr><td colspan="6" class="loading">Carregando visitas…</td></tr></tbody>
  </table>
  </div>

  <div id="sec-demandas" style="display:none">
    <div style="background:#fff;border-radius:10px;padding:14px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <div style="font-weight:700;font-size:14px;color:var(--text)">💬 Demandas dos Síndicos</div>
      <select id="filtro-status" onchange="renderDemandas()" style="padding:7px 10px;border:1px solid var(--gray2);border-radius:6px;font-size:13px">
        <option value="">Todos os status</option>
        <option value="aberta" selected>🆕 Abertas</option>
        <option value="em_andamento">⏳ Em andamento</option>
        <option value="resolvida">✅ Resolvidas</option>
        <option value="fechada">🔒 Fechadas</option>
      </select>
      <select id="filtro-condo-dem" onchange="renderDemandas()" style="padding:7px 10px;border:1px solid var(--gray2);border-radius:6px;font-size:13px;flex:1;min-width:140px">
        <option value="">Todos condomínios</option>
      </select>
      <button onclick="carregarDemandas()" style="padding:7px 14px;border:none;border-radius:6px;background:var(--teal);color:#fff;font-weight:700;cursor:pointer;font-size:12px">🔄 Atualizar</button>
    </div>
    <div id="demandas-grid"></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://fimmjgdwhifsrrbreche.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpbW1qZ2R3aGlmc3JyYnJlY2hlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NzU2NDIsImV4cCI6MjA5NTE1MTY0Mn0.eAmMS95M8BkfX3NCcOtHnhKWXy0jkvXwSGEoqv_Q21Q';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:false}});

// Bloqueio de acesso para síndicos — painel admin é exclusivo Diagnóstika
(async()=>{
  try{
    const {data}=await sb.auth.getSession();
    if(data?.session){
      const {data:vincs}=await sb.from('user_condos').select('role').eq('user_id',data.session.user.id);
      if(vincs && vincs.length>0 && vincs.every(v=>v.role==='sindico')){
        document.body.innerHTML=`<div style="position:fixed;inset:0;background:linear-gradient(135deg,#0D3C44,#155B67);color:#fff;display:flex;align-items:center;justify-content:center;padding:20px;font-family:'Segoe UI',sans-serif">
          <div style="background:#fff;color:#1A2E31;border-radius:16px;padding:32px;max-width:420px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)">
            <img src="assets/logo-dark.png" alt="Diagnóstika" style="height:60px;margin-bottom:14px">
            <h2 style="color:#155B67;margin-bottom:10px;font-size:20px">🔒 Painel Administrativo</h2>
            <p style="color:#4A6568;margin-bottom:16px;line-height:1.5;font-size:13px">Esta área é exclusiva da equipe Diagnóstika Engenharia para gestão interna do sistema.</p>
            <p style="color:#4A6568;margin-bottom:20px;line-height:1.5;font-size:13px">Você está logado(a) como <b>síndico(a)</b>. Acesse o portal apropriado:</p>
            <a href="/sindico/" style="display:inline-block;background:#155B67;color:#fff;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:700;font-size:14px">📂 Ir para Portal do Síndico</a><br>
            <button onclick="sb.auth.signOut().then(()=>location.reload())" style="background:transparent;border:1.5px solid #5A7A7E;color:#5A7A7E;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:13px;margin-top:12px">Sair desta conta</button>
          </div>
        </div>`;
        return;
      }
    }
  }catch(e){console.warn('Auth check falhou:',e);}
})();

const CONDOS={
  'monte-carlo':{nome:'Monte Carlo',cls:'mc',cor:'#155B67'},
  'morada-morumbi':{nome:'Morada Morumbi',cls:'mm',cor:'#00B4AC'},
  'portal-primavera':{nome:'Portal Primavera',cls:'pp',cor:'#8DB72A'},
  'residencial-santa-clara':{nome:'Santa Clara',cls:'sc',cor:'#7D3C98'},
  'jardins-do-malta':{nome:'Jardins do Malta',cls:'jm',cor:'#D4A24C'}
};

let allVisitas=[];
let allDemandas=[];

function trocarSecao(s){
  document.getElementById('sec-visitas').style.display=s==='visitas'?'block':'none';
  document.getElementById('sec-demandas').style.display=s==='demandas'?'block':'none';
  document.getElementById('sec-tab-visitas').style.background=s==='visitas'?'var(--teal)':'transparent';
  document.getElementById('sec-tab-visitas').style.color=s==='visitas'?'#fff':'var(--text2)';
  document.getElementById('sec-tab-demandas').style.background=s==='demandas'?'var(--teal)':'transparent';
  document.getElementById('sec-tab-demandas').style.color=s==='demandas'?'#fff':'var(--text2)';
  if(s==='demandas') carregarDemandas();
}

async function carregarDemandas(){
  try{
    const {data,error}=await sb.from('demandas').select('*').order('created_at',{ascending:false});
    if(error) throw error;
    allDemandas=data||[];
    // popula filtro de condos
    const sel=document.getElementById('filtro-condo-dem');
    const cur=sel.value;
    sel.innerHTML='<option value="">Todos condomínios</option>'+Object.entries(CONDOS).map(([k,c])=>`<option value="${k}" ${k===cur?'selected':''}>${c.nome}</option>`).join('');
    // contador no badge
    const pendentes=allDemandas.filter(d=>d.status==='aberta'||d.status==='em_andamento').length;
    const badge=document.getElementById('dem-pendentes');
    if(pendentes>0){badge.textContent=pendentes;badge.style.display='inline-block';} else badge.style.display='none';
    renderDemandas();
  }catch(e){console.warn('Erro demandas:',e);}
}

function renderDemandas(){
  const fStatus=document.getElementById('filtro-status').value;
  const fCondo=document.getElementById('filtro-condo-dem').value;
  let v=allDemandas;
  if(fStatus) v=v.filter(d=>d.status===fStatus);
  if(fCondo) v=v.filter(d=>d.condo_id===fCondo);
  const el=document.getElementById('demandas-grid');
  if(!v.length){el.innerHTML='<div style="background:#fff;border-radius:10px;padding:40px;text-align:center;color:var(--text2)">Nenhuma demanda encontrada com este filtro</div>';return;}
  const cats={corretiva:'🔧 Manutenção corretiva',duvida:'❓ Dúvida técnica',reforma:'🏗️ Aprovação de reforma',laudo:'📋 Solicitação de laudo',emergencia:'🚨 Emergência',documento:'📄 Documento'};
  const urgs={baixa:'🟢 Baixa',media:'🟡 Média',alta:'🔴 Alta'};
  const statusLabel={aberta:'🆕 Aberta',em_andamento:'⏳ Em andamento',resolvida:'✅ Resolvida',fechada:'🔒 Fechada'};
  const statusCor={aberta:'#C00000',em_andamento:'#E65100',resolvida:'#1B8A4A',fechada:'#5A7A7E'};
  el.innerHTML=v.map(d=>{
    const c=CONDOS[d.condo_id]||{nome:d.condo_id,cls:'mc'};
    const dt=new Date(d.created_at);
    const fotos=d.fotos||[];
    const anexosHtml=fotos.length?'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px;margin-bottom:8px">'+fotos.map((a,i)=>{
      if(a.tipo==='video'){
        return '<div style="position:relative;cursor:pointer" onclick="abrirAnexoAdmin(\''+d.id+'\','+i+')"><video src="'+a.url+'" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:5px;background:#000" muted></video><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;text-shadow:0 2px 8px rgba(0,0,0,.8);pointer-events:none">▶</div></div>';
      }
      const url=typeof a==='string'?a:a.url;
      return '<img src="'+url+'" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:5px;cursor:pointer" onclick="abrirAnexoAdmin(\''+d.id+'\','+i+')">';
    }).join('')+'</div>':'';
    return `<div style="background:#fff;border-radius:10px;padding:16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-left:4px solid ${statusCor[d.status]}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;flex-wrap:wrap">
        <div style="flex:1;min-width:200px">
          <div style="font-weight:700;font-size:15px;color:var(--text);margin-bottom:3px">${d.titulo}</div>
          <div style="font-size:11.5px;color:var(--text2)"><span class="pill p-${c.cls}">${c.nome}</span> · ${cats[d.categoria]||d.categoria} · ${urgs[d.urgencia]||d.urgencia}${fotos.length?' · 📎 '+fotos.length+' anexo(s)':''}</div>
        </div>
        <span class="pill" style="background:${statusCor[d.status]};color:#fff">${statusLabel[d.status]||d.status}</span>
      </div>
      <div style="font-size:11px;color:var(--gray4);margin-bottom:8px">${dt.toLocaleString('pt-BR')}</div>
      ${d.descricao?'<div style="font-size:13px;color:var(--text);line-height:1.5;background:var(--gray);padding:10px 12px;border-radius:6px;margin-bottom:8px;white-space:pre-wrap">'+d.descricao+'</div>':''}
      ${anexosHtml}
      ${d.resposta?'<div style="background:rgba(27,138,74,.08);border-left:3px solid var(--green);padding:10px 12px;border-radius:0 6px 6px 0;font-size:12.5px;margin-bottom:8px"><b style="color:var(--green);font-size:11px;text-transform:uppercase;letter-spacing:.3px;display:block;margin-bottom:4px">✅ Resposta enviada</b>'+d.resposta+(d.respondido_em?'<div style="font-size:10px;color:var(--text2);margin-top:5px">'+new Date(d.respondido_em).toLocaleString('pt-BR')+(d.respondido_por?' · '+d.respondido_por:'')+'</div>':'')+'</div>':''}
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button onclick="responderDemanda('${d.id}')" style="background:var(--teal);color:#fff;border:none;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600">💬 ${d.resposta?'Atualizar resposta':'Responder'}</button>
        ${d.status==='aberta'?`<button onclick="mudarStatus('${d.id}','em_andamento')" style="background:#E65100;color:#fff;border:none;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600">⏳ Iniciar atendimento</button>`:''}
        ${d.status!=='resolvida'?`<button onclick="mudarStatus('${d.id}','resolvida')" style="background:var(--green);color:#fff;border:none;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600">✅ Marcar resolvida</button>`:''}
        ${d.status!=='fechada'?`<button onclick="mudarStatus('${d.id}','fechada')" style="background:var(--gray3);color:var(--text);border:none;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600">🔒 Fechar</button>`:''}
        <button onclick="excluirDemanda('${d.id}')" style="background:transparent;border:1px solid var(--red);color:var(--red);padding:7px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600">🗑 Excluir</button>
      </div>
    </div>`;
  }).join('');
}

let _respAnexos=[];

function compressarImagemAdmin(file,maxW=1280,quality=0.78){
  return new Promise((resolve,reject)=>{
    const fr=new FileReader();
    fr.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const r=Math.min(1,maxW/img.width);
        const c=document.createElement('canvas');
        c.width=Math.round(img.width*r); c.height=Math.round(img.height*r);
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        resolve({tipo:'image', origem:'diagnostika', url:c.toDataURL('image/jpeg',quality), nome:file.name, tamanho:Math.round(c.width*c.height*0.3/1024)+'KB'});
      };
      img.onerror=()=>reject(new Error('imagem inválida'));
      img.src=fr.result;
    };
    fr.onerror=()=>reject(new Error('leitura falhou'));
    fr.readAsDataURL(file);
  });
}
function lerArquivoBin(file, maxMB=25, tipoLabel='video'){
  return new Promise((resolve,reject)=>{
    if(file.size>maxMB*1024*1024){
      reject(new Error('"'+file.name+'" tem mais de '+maxMB+'MB. Reduza o arquivo.'));
      return;
    }
    const fr=new FileReader();
    fr.onload=()=>resolve({tipo:tipoLabel, origem:'diagnostika', url:fr.result, nome:file.name, tamanho:Math.round(file.size/1024)+'KB', mimeType:file.type});
    fr.onerror=()=>reject(new Error('falha ao ler'));
    fr.readAsDataURL(file);
  });
}

async function processarAnexosAdmin(inp){
  if(!inp.files.length) return;
  const preview=document.getElementById('resp-preview');
  preview.innerHTML='<div style="text-align:center;color:var(--text2);font-size:12px;padding:8px">⏳ Processando…</div>';
  for(const f of inp.files){
    try{
      if(f.type.startsWith('image/')){
        _respAnexos.push(await compressarImagemAdmin(f));
      } else if(f.type.startsWith('video/')){
        _respAnexos.push(await lerArquivoBin(f,25,'video'));
      } else if(f.type==='application/pdf' || f.name.toLowerCase().endsWith('.pdf')){
        _respAnexos.push(await lerArquivoBin(f,10,'pdf'));
      } else {
        // outros documentos (docx, xlsx, etc)
        _respAnexos.push(await lerArquivoBin(f,10,'doc'));
      }
    }catch(e){ alert('Erro com '+f.name+': '+e.message); }
  }
  inp.value='';
  renderRespPreview();
}
function renderRespPreview(){
  const preview=document.getElementById('resp-preview');
  if(!_respAnexos.length){ preview.innerHTML=''; return; }
  preview.innerHTML='<div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px">📎 '+_respAnexos.length+' anexo(s)</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:6px">'+_respAnexos.map((a,i)=>{
    let thumb;
    if(a.tipo==='image') thumb='<img src="'+a.url+'" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:5px">';
    else if(a.tipo==='video') thumb='<div style="width:100%;aspect-ratio:1;background:#1a1a1a;border-radius:5px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px">🎥</div>';
    else if(a.tipo==='pdf') thumb='<div style="width:100%;aspect-ratio:1;background:#C00000;border-radius:5px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;font-weight:700">PDF</div>';
    else thumb='<div style="width:100%;aspect-ratio:1;background:var(--gray4);border-radius:5px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px">📄</div>';
    return '<div style="position:relative">'+thumb+'<button type="button" onclick="removerRespAnexo('+i+')" style="position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;background:rgba(192,0,0,.95);color:#fff;border:none;cursor:pointer;font-size:13px;font-weight:700;line-height:1;padding:0;display:flex;align-items:center;justify-content:center">×</button><div style="font-size:9px;color:var(--text2);text-align:center;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="'+a.nome+'">'+a.nome+'</div></div>';
  }).join('')+'</div>';
}
function removerRespAnexo(i){ _respAnexos.splice(i,1); renderRespPreview(); }

async function enviarResposta(id){
  const d=allDemandas.find(x=>x.id===id);
  const texto=document.getElementById('resp-texto').value.trim();
  if(!texto && !_respAnexos.length){ alert('Escreva uma resposta ou anexe pelo menos um arquivo'); return; }
  const btn=document.getElementById('btn-enviar-resp');
  btn.disabled=true; btn.textContent='⏳ Enviando…';
  try{
    // Mescla anexos: mantém do síndico (sem origem ou origem=sindico), substitui da equipe
    const fotosExistentes=(d.fotos||[]).filter(f=>!f.origem || f.origem==='sindico');
    const novasFotos=[...fotosExistentes, ..._respAnexos];
    const {error}=await sb.from('demandas').update({
      resposta:texto,
      respondido_em:new Date().toISOString(),
      respondido_por:'Diagnóstika',
      status:d.status==='aberta'?'em_andamento':d.status,
      fotos:novasFotos
    }).eq('id',id);
    if(error) throw error;
    _respAnexos=[];
    document.querySelector('.modal-overlay')?.remove();
    carregarDemandas();
  }catch(e){ alert('Erro: '+e.message); btn.disabled=false; btn.textContent='📤 Enviar resposta para o síndico'; }
}
async function mudarStatus(id,novoStatus){
  try{
    const {error}=await sb.from('demandas').update({status:novoStatus,updated_at:new Date().toISOString()}).eq('id',id);
    if(error) throw error;
    carregarDemandas();
  }catch(e){alert('Erro: '+e.message);}
}
function abrirAnexoAdmin(demId, idx){
  const d=allDemandas.find(x=>x.id===demId);
  if(!d || !d.fotos || !d.fotos[idx]) return;
  const a=d.fotos[idx];

}

async function excluirDemanda(id){
  if(!confirm('Excluir esta demanda permanentemente?')) return;

async function carregar(){
  const tbody=document.getElementById('tbody');
  tbody.innerHTML='<tr><td colspan="6" class="loading">Carregando visitas…</td></tr>';
  try{
    const {data,error}=await sb.from('visitas').select('*').order('data',{ascending:false}).order('created_at',{ascending:false}).limit(500);
    if(error) throw error;
    allVisitas=data||[];
    document.getElementById('conn-badge').textContent='● Conectado · '+allVisitas.length+' visitas no banco';
    document.getElementById('conn-badge').classList.add('live');
    renderStats();
    popularFiltro();
    renderTabela();
  }catch(e){
    tbody.innerHTML='<tr><td colspan="6" class="loading" style="color:#C00000">❌ Erro: '+e.message+'</td></tr>';
    document.getElementById('conn-badge').textContent='❌ Erro: '+e.message;
  }
}

function renderStats(){
  const total=allVisitas.length;
  const porCondo={};
  Object.keys(CONDOS).forEach(k=>porCondo[k]=0);
  allVisitas.forEach(v=>{ if(porCondo[v.condo_id]!==undefined) porCondo[v.condo_id]++; });
  const totalNC=allVisitas.reduce((s,v)=>s+Object.values(v.itens||{}).filter(i=>i.status==='nao_conforme').length,0);
  const stats=document.getElementById('stats');
  stats.innerHTML=`
    <div class="stat s-total"><div class="stat-num">${total}</div><div class="stat-label">Total de visitas</div><div class="stat-sub">${totalNC} NC acumuladas</div></div>
    ${Object.entries(porCondo).map(([k,n])=>{
      const c=CONDOS[k];
      return `<div class="stat s-${c.cls}"><div class="stat-num">${n}</div><div class="stat-label">${c.nome}</div></div>`;
    }).join('')}`;
}

  if(!v.length){ tbody.innerHTML='<tr><td colspan="6" class="empty"><h3>Nenhuma visita encontrada</h3><p>Quando o engenheiro salvar visitas no app PMP, elas aparecem aqui automaticamente.</p></td></tr>'; return; }

    const c=CONDOS[x.condo_id]||{nome:x.condo_id,cls:'mc'};

    const na=itens.filter(i=>i.status==='na').length;

    const undInfo = x.tipo==='reforma' && (x.bloco||x.apartamento||x.morador) ? `<br><small style="color:#7B1FA2;font-weight:600">📍 ${[x.bloco&&'Bl '+x.bloco, x.apartamento&&'Ap '+x.apartamento, x.morador].filter(Boolean).join(' · ')}</small>` : '';

let modoSelecaoAdmin=false;
let selecionadasAdmin=new Set();
function toggleSelecao(){
  modoSelecaoAdmin=!modoSelecaoAdmin;
  selecionadasAdmin.clear();
  document.getElementById('btn-selecao').textContent=modoSelecaoAdmin?'✕ Cancelar':'☑ Selecionar';
  document.getElementById('btn-selecao').style.color=modoSelecaoAdmin?'#C00000':'';
  // adiciona/remove coluna do thead
  const theadRow=document.getElementById('thead-row');
  const existing=theadRow.querySelector('th.sel-col');
  if(modoSelecaoAdmin && !existing){
    const th=document.createElement('th'); th.className='sel-col'; th.style.textAlign='center'; th.style.width='30px';
    theadRow.insertBefore(th, theadRow.firstChild);
  } else if(!modoSelecaoAdmin && existing){ existing.remove(); }
  atualizarBulkBar();
  renderTabela();
}
function toggleSelAdmin(id,ev){
  if(ev) ev.stopPropagation();
  if(selecionadasAdmin.has(id)) selecionadasAdmin.delete(id);
  else selecionadasAdmin.add(id);
  atualizarBulkBar();
  renderTabela();
}
function selecionarTodasAdmin(){
  const fCondo=document.getElementById('filtro-condo').value;
  const fBusca=document.getElementById('filtro-busca').value.toLowerCase().trim();
  let v=allVisitas;
  if(fCondo) v=v.filter(x=>x.condo_id===fCondo);
  if(fBusca) v=v.filter(x=>(x.engenheiro||'').toLowerCase().includes(fBusca)||(x.data||'').includes(fBusca)||(x.representante||'').toLowerCase().includes(fBusca));
  v.forEach(x=>selecionadasAdmin.add(x.id));
  atualizarBulkBar();
  renderTabela();
}
function limparSelecaoAdmin(){ selecionadasAdmin.clear(); atualizarBulkBar(); renderTabela(); }
function atualizarBulkBar(){
  const bar=document.getElementById('bulk-bar');
  bar.style.display=modoSelecaoAdmin?'flex':'none';
  document.getElementById('bulk-count').textContent=selecionadasAdmin.size;
}
async function excluirSelecionadasAdmin(){
  if(!selecionadasAdmin.size){alert('Nenhuma visita selecionada');return;}
  if(!confirm(`⚠ Excluir ${selecionadasAdmin.size} visita(s) selecionada(s)?\n\nIsso remove permanentemente todos os dados (checklists, fotos, assinaturas) — não pode ser desfeito.`)) return;
  try{
    const ids=[...selecionadasAdmin];
    const {error}=await sb.from('visitas').delete().in('id',ids);
    if(error) throw error;
    allVisitas=allVisitas.filter(v=>!selecionadasAdmin.has(v.id));
    selecionadasAdmin.clear();
    atualizarBulkBar();
    renderStats();
    renderTabela();
    alert('✓ '+ids.length+' visita(s) excluída(s)');
  }catch(e){alert('Erro: '+e.message);}
}

async function excluirVisitaAdmin(id,ev){
  if(ev){ev.stopPropagation();}
  if(!confirm('⚠ Excluir esta visita permanentemente?\n\nIsso remove:\n• Dados do checklist\n• Fotos e assinaturas\n• Registro no banco\n\nNÃO pode ser desfeito.')) return;
  try{
    const {error}=await sb.from('visitas').delete().eq('id',id);
    if(error) throw error;
    allVisitas=allVisitas.filter(v=>v.id!==id);
    renderStats();
    renderTabela();
  }catch(e){ alert('Erro ao excluir: '+e.message); }
}
document.getElementById('filtro-condo').addEventListener('change',renderTabela);
document.getElementById('filtro-busca').addEventListener('input',renderTabela);

carregar();

// Realtime: recebe push de qualquer mudança no banco instantaneamente
try{
  sb.channel('admin-realtime')
    .on('postgres_changes',{event:'*',schema:'public',table:'visitas'},payload=>{
      console.log('☁ Realtime visita:',payload.eventType);
      document.getElementById('conn-badge').textContent='● Atualizado agora ('+payload.eventType+')';
      carregar();
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'demandas'},payload=>{
      console.log('☁ Realtime demanda:',payload.eventType);
      carregarDemandas();
    })
    .subscribe();
}catch(e){console.warn('Realtime falhou:',e);}

// Carga inicial de demandas para o badge
carregarDemandas();

// Polling de segurança: a cada 15s, mesmo se Realtime cair
setInterval(carregar,15000);
window.addEventListener('online',carregar);
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')carregar();});
</script>
