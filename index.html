<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#155B67">
<title>Redirecionando — Painel Técnico</title>
<meta http-equiv="refresh" content="2;url=https://diagnostika-engenharia.github.io/pmp/">
<link rel="canonical" href="https://diagnostika-engenharia.github.io/pmp/">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#0D3C44 0%,#155B67 50%,#00B4AC 100%);min-height:100vh;color:#fff;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;color:#1A2E31;border-radius:14px;padding:30px;max-width:480px;width:100%;text-align:center;box-shadow:0 12px 48px rgba(0,0,0,.3)}
.icon{font-size:54px;margin-bottom:14px}
h1{color:#155B67;font-size:22px;font-weight:700;margin-bottom:6px}
p{color:#4A6568;font-size:14px;line-height:1.5;margin-bottom:18px}
.cta{display:inline-block;background:#155B67;color:#fff;padding:13px 24px;border-radius:10px;text-decoration:none;font-weight:700;font-size:14px;transition:background .15s}
.cta:hover{background:#0D3C44}
.note{margin-top:14px;font-size:11.5px;color:#5A7A7E;font-style:italic}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔀</div>
  <h1>Painel reunificado!</h1>
  <p>O Painel Admin foi integrado ao <b>Painel Técnico</b>. Agora você gerencia tudo (visitas, demandas e agenda) em um único lugar.</p>
  <a href="https://diagnostika-engenharia.github.io/pmp/" class="cta">
    <span class="spinner"></span>Abrir Painel Técnico →
  </a>
  <div class="note">Redirecionamento automático em 2 segundos.<br>Atualize seus bookmarks: <b>diagnostika-engenharia.github.io/pmp/</b></div>
</div>
<script>setTimeout(()=>location.replace('https://diagnostika-engenharia.github.io/pmp/'), 2000);</script>
</body>
</html>
